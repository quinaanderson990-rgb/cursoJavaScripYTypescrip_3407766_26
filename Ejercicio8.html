<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 8</title>
</head>
<body>

<script>

// Pedir datos
let producto = prompt("Ingrese el nombre del producto");
let precio = parseFloat(prompt("Ingrese el precio del producto"));
let descuento = parseFloat(prompt("Ingrese el porcentaje de descuento"));

// Validar el porcentaje
if (descuento < 1 || descuento > 70) {

    alert("Porcentaje no válido, debe estar entre 1% y 70%");

} else {

    let valorDescuento = precio * (descuento / 100);
    let precioFinal = precio - valorDescuento;

    let mensaje = descuento > 50 ? "¡Oferta especial!" : "Precio de temporada";

    document.write("<h2>Descuento de temporada</h2>");
    document.write("Producto: " + producto + "<br>");
    document.write("Precio original: $" + precio.toLocaleString("es-CO") + "<br>");
    document.write("Descuento: $" + valorDescuento.toLocaleString("es-CO") + "<br>");
    document.write("Precio final: $" + precioFinal.toLocaleString("es-CO") + "<br>");
    document.write(mensaje);

}

</script>

</body>
</html>
